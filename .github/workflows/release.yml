name: Build Bookup release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer and portable app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ github.event.inputs.version }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build release artifacts
        shell: pwsh
        run: .\scripts\build_release.ps1 -Version "${{ steps.version.outputs.version }}" -SkipPythonInstall

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bookup-Windows-${{ steps.version.outputs.version }}
          path: |
            release/Bookup-Windows-${{ steps.version.outputs.version }}-portable.zip
            release/Bookup-Setup-${{ steps.version.outputs.version }}.exe

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Bookup ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/Bookup-Windows-${{ steps.version.outputs.version }}-portable.zip
            release/Bookup-Setup-${{ steps.version.outputs.version }}.exe
